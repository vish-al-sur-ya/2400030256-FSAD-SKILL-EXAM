<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" required>
            <div class="error" id="firstNameError"></div>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" required>
            <div class="error" id="lastNameError"></div>
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" required>
            <div class="error" id="emailError"></div>
        </div>
        <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" required>
            <div class="error" id="phoneError"></div>
        </div>
        <div class="form-group">
            <label for="country">Country *</label>
            <select id="country" required>
                <option value="">Select...</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
                <option value="UK">UK</option>
            </select>
            <div class="error" id="countryError"></div>
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth *</label>
            <input type="text" id="dob" placeholder="dd/mm/yyyy" required>
            <div class="error" id="dobError"></div>
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" required>
            <div class="error" id="passwordError"></div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input type="password" id="confirmPassword" required>
            <div class="error" id="confirmPasswordError"></div>
        </div>
        <div class="form-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to Terms & Conditions</label>
        </div>
        <button type="submit">Register</button>
    </form>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        let isValid = true;

        // Clear previous errors
        document.querySelectorAll('.error').forEach(function(error) {
            error.textContent = '';
        });

        // Validate fields
        if (!document.getElementById('firstName').value) {
            document.getElementById('firstNameError').textContent = 'First name is required.';
            isValid = false;
        }
        if (!document.getElementById('lastName').value) {
            document.getElementById('lastNameError').textContent = 'Last name is required.';
            isValid = false;
        }
        if (!document.getElementById('email').value) {
            document.getElementById('emailError').textContent = 'Email ID is required.';
            isValid = false;
        }
        if (!document.getElementById('phone').value) {
            document.getElementById('phoneError').textContent = 'Phone number is required.';
            isValid = false;
        }
        if (!document.getElementById('country').value) {
            document.getElementById('countryError').textContent = 'Please select a country.';
            isValid = false;
        }
        if (!document.getElementById('dob').value) {
            document.getElementById('dobError').textContent = 'Date of birth is required.';
            isValid = false;
        }
        if (!document.getElementById('password').value) {
            document.getElementById('passwordError').textContent = 'Password must be at least 8 characters.';
            isValid = false;
        }
        if (document.getElementById('password').value !== document.getElementById('confirmPassword').value) {
            document.getElementById('confirmPasswordError').textContent = 'Passwords do not match.';
            isValid = false;
        }

        if (isValid) {
            alert('Form submitted successfully!');
            // Here you can add the logic to submit the form data
        }
    });
</script>

</body>
</html>
